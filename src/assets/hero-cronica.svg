<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a0f"/>
      <stop offset="100%" stop-color="#050205"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="candle">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric fog -->
  <ellipse cx="600" cy="400" rx="600" ry="200" fill="url(#glow)"/>

  <!-- Table surface -->
  <path d="M100,420 Q600,380 1100,420 L1100,630 L100,630 Z" fill="#0d0808" opacity="0.8"/>
  <path d="M100,420 Q600,380 1100,420" stroke="#2a1515" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Old book / chronicle (center) -->
  <g transform="translate(480, 280)">
    <!-- Left page -->
    <path d="M120,0 L10,10 Q0,15 5,140 L120,150" fill="#1c1610" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M120,0 L230,10 Q240,15 235,140 L120,150" fill="#1e1812" stroke="#3a2a1a" stroke-width="1.5"/>
    <!-- Spine -->
    <line x1="120" y1="0" x2="120" y2="150" stroke="#4a3020" stroke-width="3"/>
    <!-- Text lines left -->
    <line x1="25" y1="30" x2="105" y2="28" stroke="#3a2a1a" stroke-width="1" opacity="0.5"/>
    <line x1="25" y1="45" x2="100" y2="43" stroke="#3a2a1a" stroke-width="1" opacity="0.4"/>
    <line x1="25" y1="60" x2="95" y2="58" stroke="#3a2a1a" stroke-width="1" opacity="0.5"/>
    <line x1="25" y1="75" x2="105" y2="73" stroke="#3a2a1a" stroke-width="1" opacity="0.3"/>
    <line x1="25" y1="90" x2="90" y2="88" stroke="#3a2a1a" stroke-width="1" opacity="0.4"/>
    <line x1="25" y1="105" x2="100" y2="103" stroke="#3a2a1a" stroke-width="1" opacity="0.3"/>
    <!-- Text lines right -->
    <line x1="135" y1="30" x2="215" y2="28" stroke="#3a2a1a" stroke-width="1" opacity="0.4"/>
    <line x1="135" y1="45" x2="220" y2="43" stroke="#3a2a1a" stroke-width="1" opacity="0.5"/>
    <line x1="135" y1="60" x2="210" y2="58" stroke="#3a2a1a" stroke-width="1" opacity="0.3"/>
    <line x1="135" y1="75" x2="218" y2="73" stroke="#3a2a1a" stroke-width="1" opacity="0.4"/>
    <!-- Ankh symbol on left page -->
    <g transform="translate(55, 110)" opacity="0.3">
      <circle cx="0" cy="-8" r="5" fill="none" stroke="#8b0000" stroke-width="1.5"/>
      <line x1="0" y1="-3" x2="0" y2="15" stroke="#8b0000" stroke-width="1.5"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#8b0000" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Candle left -->
  <g transform="translate(300, 250)">
    <rect x="-8" y="20" width="16" height="60" fill="#2a2018" rx="2"/>
    <ellipse cx="0" cy="20" rx="8" ry="3" fill="#3a2a1a"/>
    <!-- Flame -->
    <ellipse cx="0" cy="8" rx="8" ry="18" fill="#ff6600" opacity="0.15" filter="url(#candle)"/>
    <path d="M0,-5 Q6,5 3,15 Q0,20 -3,15 Q-6,5 0,-5" fill="#ff9900" opacity="0.6"/>
    <path d="M0,0 Q3,5 1,12 Q0,14 -1,12 Q-3,5 0,0" fill="#ffcc00" opacity="0.8"/>
    <!-- Light cast -->
    <ellipse cx="0" cy="60" rx="80" ry="20" fill="#ff6600" opacity="0.03" filter="url(#candle)"/>
  </g>

  <!-- Candle right -->
  <g transform="translate(900, 260)">
    <rect x="-8" y="20" width="16" height="55" fill="#2a2018" rx="2"/>
    <ellipse cx="0" cy="20" rx="8" ry="3" fill="#3a2a1a"/>
    <ellipse cx="0" cy="8" rx="7" ry="16" fill="#ff6600" opacity="0.12" filter="url(#candle)"/>
    <path d="M0,-3 Q5,4 2,13 Q0,16 -2,13 Q-5,4 0,-3" fill="#ff9900" opacity="0.5"/>
    <path d="M0,1 Q2,5 1,10 Q0,12 -1,10 Q-2,5 0,1" fill="#ffcc00" opacity="0.7"/>
    <ellipse cx="0" cy="55" rx="70" ry="18" fill="#ff6600" opacity="0.03" filter="url(#candle)"/>
  </g>

  <!-- Dice (d10) left side -->
  <g transform="translate(220, 380) rotate(-15)">
    <polygon points="0,-18 16,0 10,18 -10,18 -16,0" fill="#1a0a0a" stroke="#5a1010" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b0000" font-size="14" font-family="serif" font-weight="bold">7</text>
  </g>

  <!-- Dice (d10) right side -->
  <g transform="translate(950, 390) rotate(20)">
    <polygon points="0,-18 16,0 10,18 -10,18 -16,0" fill="#1a0a0a" stroke="#5a1010" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b0000" font-size="14" font-family="serif" font-weight="bold">3</text>
  </g>

  <!-- Character sheets scattered -->
  <g transform="translate(150, 350) rotate(-8)">
    <rect width="80" height="100" fill="#151010" stroke="#2a1a1a" stroke-width="1" rx="2"/>
    <line x1="10" y1="15" x2="70" y2="15" stroke="#2a1a1a" stroke-width="1"/>
    <line x1="10" y1="25" x2="50" y2="25" stroke="#2a1a1a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="35" x2="60" y2="35" stroke="#2a1a1a" stroke-width="0.5" opacity="0.5"/>
    <!-- Blood dots -->
    <circle cx="15" cy="50" r="3" fill="#8b0000" opacity="0.6"/>
    <circle cx="25" cy="50" r="3" fill="#8b0000" opacity="0.6"/>
    <circle cx="35" cy="50" r="3" fill="#8b0000" opacity="0.4"/>
    <circle cx="45" cy="50" r="3" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.3"/>
  </g>

  <g transform="translate(970, 340) rotate(12)">
    <rect width="75" height="95" fill="#151010" stroke="#2a1a1a" stroke-width="1" rx="2"/>
    <line x1="10" y1="15" x2="65" y2="15" stroke="#2a1a1a" stroke-width="1"/>
    <line x1="10" y1="25" x2="45" y2="25" stroke="#2a1a1a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="35" x2="55" y2="35" stroke="#2a1a1a" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Blood drop on book -->
  <g transform="translate(610, 330)">
    <path d="M0,-8 Q5,2 4,8 Q3,13 0,14 Q-3,13 -4,8 Q-5,2 0,-8" fill="#8b0000" opacity="0.7"/>
    <ellipse cx="0" cy="15" rx="6" ry="2" fill="#5a0000" opacity="0.3"/>
  </g>

  <!-- Subtle spider web top-right -->
  <g transform="translate(1100, 0)" opacity="0.08">
    <line x1="0" y1="0" x2="-80" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-100" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="100" stroke="#fff" stroke-width="0.5"/>
    <path d="M-30,30 Q-50,25 -60,40" stroke="#fff" stroke-width="0.3" fill="none"/>
    <path d="M-50,50 Q-70,45 -85,65" stroke="#fff" stroke-width="0.3" fill="none"/>
  </g>

  <!-- Subtle particles / dust -->
  <circle cx="400" cy="200" r="1" fill="#8b0000" opacity="0.2"/>
  <circle cx="750" cy="180" r="1.5" fill="#8b0000" opacity="0.15"/>
  <circle cx="550" cy="150" r="1" fill="#fff" opacity="0.08"/>
  <circle cx="850" cy="220" r="1" fill="#fff" opacity="0.06"/>
  <circle cx="350" cy="300" r="1" fill="#8b0000" opacity="0.1"/>
</svg>
