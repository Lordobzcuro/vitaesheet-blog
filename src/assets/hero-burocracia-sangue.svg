<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#050205"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8b0000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blood" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d41a1a"/>
      <stop offset="50%" stop-color="#a10b0b"/>
      <stop offset="100%" stop-color="#6b0000"/>
    </radialGradient>
    <filter id="candle">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="paperShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="bloodGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#8b0000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Atmospheric glow -->
  <ellipse cx="600" cy="350" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Table surface -->
  <path d="M0,400 Q600,370 1200,400 L1200,630 L0,630 Z" fill="#0d0808" opacity="0.8"/>
  <path d="M0,400 Q600,370 1200,400" stroke="#2a1515" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Torn character sheet - main piece (center-left) -->
  <g transform="translate(320, 180) rotate(-5)" filter="url(#paperShadow)">
    <!-- Paper body -->
    <path d="M0,0 L220,0 L220,280 L200,278 L185,282 L170,276 L155,280 L140,275 L120,282 L105,277 L90,280 L70,276 L50,281 L30,275 L15,279 L0,280 Z" fill="#1c1810" stroke="#3a2a1a" stroke-width="1"/>
    <!-- Header line -->
    <line x1="20" y1="25" x2="200" y2="25" stroke="#4a3a2a" stroke-width="1.5"/>
    <!-- "Name" field -->
    <line x1="20" y1="50" x2="80" y2="50" stroke="#3a2a1a" stroke-width="0.8" opacity="0.6"/>
    <line x1="85" y1="50" x2="190" y2="50" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
    <!-- Attribute lines with erasure marks -->
    <line x1="20" y1="80" x2="140" y2="80" stroke="#3a2a1a" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="95" x2="120" y2="95" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <line x1="20" y1="110" x2="150" y2="110" stroke="#3a2a1a" stroke-width="0.5" opacity="0.5"/>
    <!-- Erasure/scribble marks -->
    <path d="M100,75 Q115,80 130,77 Q120,82 105,79" stroke="#5a4a3a" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M80,90 Q95,97 110,92" stroke="#5a4a3a" stroke-width="2" fill="none" opacity="0.3"/>
    <!-- Blood dots (tracking circles) -->
    <circle cx="30" cy="145" r="5" fill="#8b0000" opacity="0.7"/>
    <circle cx="48" cy="145" r="5" fill="#8b0000" opacity="0.7"/>
    <circle cx="66" cy="145" r="5" fill="#8b0000" opacity="0.5"/>
    <circle cx="84" cy="145" r="5" fill="#8b0000" opacity="0.3"/>
    <circle cx="102" cy="145" r="5" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.3"/>
    <circle cx="120" cy="145" r="5" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.2"/>
    <circle cx="138" cy="145" r="5" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.2"/>
    <!-- More text lines -->
    <line x1="20" y1="175" x2="160" y2="175" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <line x1="20" y1="190" x2="130" y2="190" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
    <line x1="20" y1="205" x2="145" y2="205" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <!-- Heavy crossed-out section -->
    <line x1="20" y1="225" x2="180" y2="225" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <line x1="15" y1="218" x2="185" y2="232" stroke="#5a2020" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="232" x2="185" y2="218" stroke="#5a2020" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="245" x2="170" y2="245" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Torn piece (ripped fragment - right) -->
  <g transform="translate(680, 220) rotate(12)" filter="url(#paperShadow)">
    <path d="M0,5 L5,0 L15,8 L25,2 L40,6 L55,0 L70,4 L80,0 L80,180 L0,180 Z" fill="#1e1812" stroke="#3a2a1a" stroke-width="1"/>
    <!-- Partial text lines -->
    <line x1="15" y1="30" x2="65" y2="30" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <line x1="10" y1="45" x2="70" y2="45" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
    <line x1="12" y1="60" x2="60" y2="60" stroke="#3a2a1a" stroke-width="0.5" opacity="0.4"/>
    <!-- Partial blood dots -->
    <circle cx="20" cy="90" r="5" fill="#8b0000" opacity="0.5"/>
    <circle cx="38" cy="90" r="5" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.3"/>
    <circle cx="56" cy="90" r="5" fill="none" stroke="#8b0000" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Small torn piece (bottom) -->
  <g transform="translate(550, 420) rotate(-20)" filter="url(#paperShadow)">
    <path d="M0,0 L60,0 L55,8 L62,15 L58,25 L65,40 L0,40 L5,30 L2,18 L8,8 Z" fill="#1a1610" stroke="#3a2a1a" stroke-width="0.8"/>
    <line x1="10" y1="12" x2="50" y2="12" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="25" x2="45" y2="25" stroke="#3a2a1a" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Blood splatter on paper -->
  <g filter="url(#bloodGlow)">
    <!-- Main drop on sheet -->
    <path d="M430,250 Q435,240 440,250 Q445,258 440,262 Q435,265 430,262 Q425,258 430,250" fill="url(#blood)" opacity="0.8"/>
    <ellipse cx="436" cy="266" rx="8" ry="2" fill="#5a0000" opacity="0.3"/>
    <!-- Splatter drops -->
    <circle cx="445" cy="244" r="2" fill="#8b0000" opacity="0.5"/>
    <circle cx="425" cy="255" r="1.5" fill="#8b0000" opacity="0.4"/>
    <circle cx="450" cy="258" r="1" fill="#8b0000" opacity="0.3"/>
  </g>

  <!-- Large blood drop (floating, center-right) -->
  <g transform="translate(820, 160)" filter="url(#bloodGlow)">
    <path d="M0,-35 C0,-35 -25,-3 -25,13 C-25,27 -14,38 0,38 C14,38 25,27 25,13 C25,-3 0,-35 0,-35Z" fill="url(#blood)" opacity="0.6"/>
    <ellipse cx="-7" cy="-3" rx="4" ry="6" fill="white" fill-opacity="0.08" transform="rotate(-15)"/>
  </g>

  <!-- Pencil (broken) -->
  <g transform="translate(780, 380) rotate(35)">
    <!-- Pencil body -->
    <rect x="0" y="-4" width="90" height="8" fill="#2a2018" rx="1"/>
    <polygon points="90,-4 90,4 100,0" fill="#3a2a1a"/>
    <rect x="0" y="-4" width="12" height="8" fill="#4a3020" rx="1"/>
    <!-- Break mark -->
    <path d="M45,-5 L48,-2 L44,2 L47,5" stroke="#1a0a0a" stroke-width="2" fill="none"/>
  </g>

  <!-- Eraser (used, dirty) -->
  <g transform="translate(250, 410) rotate(-10)">
    <rect width="35" height="18" fill="#2a2028" rx="3" stroke="#3a2a2a" stroke-width="0.5"/>
    <rect width="35" height="5" fill="#1a1018" rx="2" opacity="0.5"/>
  </g>

  <!-- Eraser shavings -->
  <circle cx="290" cy="420" r="1.5" fill="#2a2028" opacity="0.3"/>
  <circle cx="300" cy="425" r="1" fill="#2a2028" opacity="0.2"/>
  <circle cx="285" cy="430" r="1" fill="#2a2028" opacity="0.25"/>
  <ellipse cx="295" cy="415" rx="2" ry="1" fill="#2a2028" opacity="0.2"/>

  <!-- Candle (dim, almost spent) -->
  <g transform="translate(150, 250)">
    <rect x="-6" y="30" width="12" height="25" fill="#2a2018" rx="2"/>
    <ellipse cx="0" cy="30" rx="6" ry="2.5" fill="#3a2a1a"/>
    <!-- Small dying flame -->
    <ellipse cx="0" cy="22" rx="5" ry="10" fill="#ff6600" opacity="0.1" filter="url(#candle)"/>
    <path d="M0,18 Q3,22 2,28 Q0,30 -2,28 Q-3,22 0,18" fill="#ff9900" opacity="0.4"/>
    <path d="M0,20 Q1.5,23 1,26 Q0,27 -1,26 Q-1.5,23 0,20" fill="#ffcc00" opacity="0.6"/>
    <!-- Melted wax -->
    <path d="M-8,55 Q-6,58 0,56 Q6,58 8,55" stroke="#2a2018" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Dice (d10) scattered -->
  <g transform="translate(950, 400) rotate(25)">
    <polygon points="0,-16 14,0 9,16 -9,16 -14,0" fill="#1a0a0a" stroke="#5a1010" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#8b0000" font-size="12" font-family="serif" font-weight="bold">1</text>
  </g>
  <g transform="translate(1020, 380) rotate(-10)">
    <polygon points="0,-14 12,0 8,14 -8,14 -12,0" fill="#1a0a0a" stroke="#5a1010" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" fill="#8b0000" font-size="11" font-family="serif">4</text>
  </g>

  <!-- Blood trail from torn edge to table -->
  <path d="M540,460 Q545,475 542,490 Q544,505 540,520" stroke="#6b0000" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="540" cy="525" r="3" fill="#5a0000" opacity="0.25"/>

  <!-- Subtle spider web top-left -->
  <g transform="translate(0, 0)" opacity="0.06">
    <line x1="0" y1="0" x2="90" y2="90" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="110" y2="55" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="55" y2="110" stroke="#fff" stroke-width="0.5"/>
    <path d="M35,35 Q55,30 65,45" stroke="#fff" stroke-width="0.3" fill="none"/>
    <path d="M55,55 Q75,50 90,70" stroke="#fff" stroke-width="0.3" fill="none"/>
  </g>

  <!-- Dust particles -->
  <circle cx="400" cy="180" r="1" fill="#8b0000" opacity="0.15"/>
  <circle cx="700" cy="150" r="1.5" fill="#8b0000" opacity="0.1"/>
  <circle cx="550" cy="130" r="1" fill="#fff" opacity="0.06"/>
  <circle cx="900" cy="200" r="1" fill="#fff" opacity="0.05"/>
  <circle cx="300" cy="320" r="1" fill="#8b0000" opacity="0.08"/>
  <circle cx="1050" cy="250" r="1" fill="#fff" opacity="0.04"/>
</svg>